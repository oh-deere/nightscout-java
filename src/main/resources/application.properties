spring.application.name=nightscout-java
spring.datasource.url=jdbc:postgresql://localhost:5432/nightscout
spring.datasource.username=postgres
spring.datasource.password=supernova

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Nightscout settings
nightscout.api-secret=${API_SECRET:}
nightscout.units=${DISPLAY_UNITS:mg/dl}
nightscout.time-format=${TIME_FORMAT:24}
nightscout.theme=${THEME:default}
nightscout.language=${LANGUAGE:en}
nightscout.enable=${ENABLE:iob cob openaps pump cage sage iage ar2 bgnow direction delta devicestatus}
nightscout.show-plugins=${SHOW_PLUGINS:}
nightscout.custom-title=${CUSTOM_TITLE:Nightscout}
nightscout.alarm-types=${ALARM_TYPES:simple}
nightscout.auth-default-roles=${AUTH_DEFAULT_ROLES:readable}
nightscout.night-mode=${NIGHT_MODE:false}
nightscout.devicestatus-advanced=${DEVICESTATUS_ADVANCED:false}
nightscout.bolus-render-over=${BOLUS_RENDER_OVER:1}
nightscout.thresholds.bg-high=${BG_HIGH:260}
nightscout.thresholds.bg-target-top=${BG_TARGET_TOP:180}
nightscout.thresholds.bg-target-bottom=${BG_TARGET_BOTTOM:70}
nightscout.thresholds.bg-low=${BG_LOW:55}
nightscout.alarm-timeago-warn-mins=${ALARM_TIMEAGO_WARN_MINS:15}
nightscout.alarm-timeago-urgent-mins=${ALARM_TIMEAGO_URGENT_MINS:30}
nightscout.sage.info=${SAGE_INFO:336}
nightscout.sage.warn=${SAGE_WARN:360}
nightscout.sage.urgent=${SAGE_URGENT:361}

# LibreLink Up bridge
librelink.enabled=${LINK_UP_ENABLED:false}
librelink.username=${LINK_UP_USERNAME:}
librelink.password=${LINK_UP_PASSWORD:}
librelink.region=${LINK_UP_REGION:EU}
librelink.poll-interval-ms=${LINK_UP_POLL_INTERVAL_MS:300000}
librelink.connection-id=${LINK_UP_CONNECTION:}
librelink.retry-attempts=${LINK_UP_RETRY_ATTEMPTS:3}
librelink.retry-interval-ms=${LINK_UP_RETRY_INTERVAL_MS:30000}

# MCP server (for Claude / agent integrations)
spring.ai.mcp.server.name=nightscout
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=true

# Tomcat — allow square brackets in URL query (Nightscout-style find[date][$gte] params)
server.tomcat.relaxed-query-chars=[,],{,},|

# Jackson
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Security — permit actuator and status without auth
spring.security.filter.dispatcher-types=request

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
