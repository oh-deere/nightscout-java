spring.application.name=nightscout-java
spring.datasource.url=jdbc:postgresql://localhost:5432/nightscout
spring.datasource.username=nightscout
spring.datasource.password=local

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Nightscout settings
nightscout.api-secret=${API_SECRET:}
nightscout.units=${DISPLAY_UNITS:mg/dl}
nightscout.time-format=${TIME_FORMAT:24}
nightscout.theme=${THEME:default}
nightscout.language=${LANGUAGE:en}
nightscout.enable=${ENABLE:iob cob openaps pump cage sage iage ar2 bgnow}
nightscout.thresholds.bg-high=${BG_HIGH:260}
nightscout.thresholds.bg-target-top=${BG_TARGET_TOP:180}
nightscout.thresholds.bg-target-bottom=${BG_TARGET_BOTTOM:80}
nightscout.thresholds.bg-low=${BG_LOW:55}
nightscout.alarm-timeago-warn-mins=${ALARM_TIMEAGO_WARN:15}
nightscout.alarm-timeago-urgent-mins=${ALARM_TIMEAGO_URGENT:30}

# LibreLink Up bridge
librelink.enabled=${LINK_UP_ENABLED:false}
librelink.username=${LINK_UP_USERNAME:}
librelink.password=${LINK_UP_PASSWORD:}
librelink.region=${LINK_UP_REGION:EU}
librelink.poll-interval-ms=${LINK_UP_POLL_INTERVAL_MS:300000}
librelink.connection-id=${LINK_UP_CONNECTION:}

# Jackson
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Security — permit actuator and status without auth
spring.security.filter.dispatcher-types=request

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
