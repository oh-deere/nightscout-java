spring.application.name=nightscout-java
spring.datasource.url=jdbc:postgresql://localhost:5432/nightscout
spring.datasource.username=postgres
spring.datasource.password=supernova

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Nightscout — only bootstrap-only settings live here. Everything else is in the
# runtime_settings table and editable from the admin UI; defaults are baked into
# EffectiveSettings.
nightscout.api-secret=${API_SECRET:}
nightscout.enable=${ENABLE:iob cob openaps pump cage sage iage ar2 bgnow direction delta devicestatus}
nightscout.show-plugins=${SHOW_PLUGINS:}

# LibreLink Up bridge
librelink.enabled=${LINK_UP_ENABLED:false}
librelink.username=${LINK_UP_USERNAME:}
librelink.password=${LINK_UP_PASSWORD:}
librelink.region=${LINK_UP_REGION:EU}
librelink.poll-interval-ms=${LINK_UP_POLL_INTERVAL_MS:300000}
librelink.connection-id=${LINK_UP_CONNECTION:}
librelink.retry-attempts=${LINK_UP_RETRY_ATTEMPTS:3}
librelink.retry-interval-ms=${LINK_UP_RETRY_INTERVAL_MS:30000}

# OAuth2 resource server — optional second auth method.
# When enabled, callers can authenticate either with the api-secret header (existing
# Nightscout-style) or with a Bearer JWT issued by the configured OAuth issuer.
# Disabled by default; flip to true in k3s and set the issuer/jwk URIs to point at
# the OhDeere auth server.
nightscout.oauth.enabled=${OAUTH_ENABLED:false}
nightscout.oauth.issuer-uri=${OAUTH_ISSUER_URI:https://auth.ohdeere.se}
nightscout.oauth.jwk-set-uri=${OAUTH_JWK_SET_URI:https://auth.ohdeere.se/oauth2/jwks}
# Disable Spring Boot's auto OAuth2 wiring; we configure JwtDecoder manually so the
# feature can be turned on/off cleanly without needing the issuer to be reachable at
# startup (the auto-config tries to fetch the JWKs immediately).
spring.autoconfigure.exclude=org.springframework.boot.security.oauth2.server.resource.autoconfigure.servlet.OAuth2ResourceServerAutoConfiguration

# MCP server (for Claude / agent integrations)
spring.ai.mcp.server.name=nightscout
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=true

# Tomcat — allow square brackets in URL query (Nightscout-style find[date][$gte] params)
server.tomcat.relaxed-query-chars=[,],{,},|

# Jackson
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Security — permit actuator and status without auth
spring.security.filter.dispatcher-types=request

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
