spring.application.name=nightscout-java
server.port=8080

# TLS terminates at fallowdeere (nginx) → Traefik → pod over HTTP.
# server.forward-headers-strategy=framework alone isn't enough because
# k3s Traefik has externalTrafficPolicy=Cluster (source IP SNATed) and no
# trustedIPs, so it strips fallowdeere's X-Forwarded-Proto: https and
# regenerates it as http. Pin the redirect-uri to the public HTTPS URL
# until the cluster-wide Traefik HelmChartConfig trusts 10.10.2.0/24.
server.forward-headers-strategy=framework
spring.security.oauth2.client.registration.ohdeere.redirect-uri=https://noah2.ohdeere.se/login/oauth2/code/ohdeere

# Database — injected via env vars:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# Actuator for k8s probes
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Spring Boot Admin
spring.boot.admin.client.url=http://ohdeere-boot-admin.ohdeere
spring.boot.admin.client.instance.service-base-url=http://nightscout-java.ohdeere

# Git info in actuator
management.info.git.mode=full
