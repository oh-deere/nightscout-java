spring.application.name=nightscout-java
server.port=8080

# TLS terminates at fallowdeere (nginx) → Traefik → pod over HTTP. Without
# this, Spring builds redirect_uri=http://… which fails the authorize
# request against the https://… URI registered in ohdeere-auth-server.
server.forward-headers-strategy=framework

# Database — injected via env vars:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# Actuator for k8s probes
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Spring Boot Admin
spring.boot.admin.client.url=http://ohdeere-boot-admin.ohdeere
spring.boot.admin.client.instance.service-base-url=http://nightscout-java.ohdeere

# Git info in actuator
management.info.git.mode=full
