name: Build and Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: 10.10.2.181:30500
  IMAGE_NAME: nightscout-java

jobs:
  build-and-deploy:
    runs-on: [self-hosted, ohdeere-k3s]

    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build and verify
        run: ./mvnw clean verify -Djib.skip=true

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push image with Jib
        run: |
          ./mvnw compile jib:build \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -Djib.to.tags=${{ steps.tag.outputs.tag }},latest \
            -Djib.allowInsecureRegistries=true \
            -Djib.from.image=eclipse-temurin:25-jre \
            -Djib.from.platforms=linux/amd64,linux/arm64 \
            -Djib.container.mainClass=se.ohdeere.nightscout.NightscoutApplication \
            -Djib.container.ports=8080 \
            -Djib.container.args="--spring.profiles.active=k3s" \
            -Djib.container.jvmFlags="-Dapp.git-hash=${{ steps.tag.outputs.tag }}"

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/nightscout-java \
            nightscout-java=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -n ohdeere

      - name: Wait for rollout
        run: kubectl rollout status deployment/nightscout-java -n ohdeere --timeout=180s

      - name: Verify deployment
        run: kubectl get pods -n ohdeere -l app=nightscout-java -o wide
